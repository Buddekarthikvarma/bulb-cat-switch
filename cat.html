<!DOCTYPE html>
<html>
 <head>
 <script src="https://cdn.tailwindcss.com"></script>
 <script>
 tailwind.config = {
 theme: {
 extend: {
 fontFamily: {
 roboto: ["Roboto", "sans-serif"],
 },
 },
 },
 };
 </script>
 </head>
 <body>
 <div
 class="bg-[#0b0b0b] min-h-screen flex flex-col justify-center items-center"
 >
 <div>
 <img id="bulbImage()"
 src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-on-img.png"
 class="w-[150px]" 
 />
 </div>
 <div>
 <img id="catImage()"
 src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/cat-img.png"
 class="w-[300px]" 
 />
 </div>
 <div class="pt-5 text-center">
 <div class="bg-[#7b8794] w-[294px] rounded-xl p-6 m-4">
 <h1 id="switchStatus" class="text-white font-roboto text-2xl font-medium mb-6">
 Switched On
 </h1>
 <button id="offSwitch" onclick="of()"
 class="w-[99px] h-11 rounded-lg bg-[#e12d39] text-white font-roboto text-2xl font-bold"
 >
 OFF
 </button>
 <button id="onSwitch" onclick="on()"
 class="w-[99px] h-11 rounded-lg bg-[#cbd2d9] text-white font-roboto text-2xl font-bold ml-4"
 >
 ON
 </button>
 </div>
 </div>
 </div>
 <script>
    function of(){
        document.getElementById("bulbImage()").src = "https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-off-img.png"
        document.getElementById("catImage()").src = "https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/cat-eyes-img.png";
         document.getElementById("switchStatus").textContent = "Switched Off";
  document.getElementById("onSwitch").style.backgroundColor = "#22c55e";
  document.getElementById("offSwitch").style.backgroundColor = "#cbd2d9";
    }
    function on(){
        document.getElementById("bulbImage()").src =  "https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-on-img.png";
        document.getElementById("catImage()").src =   "https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/cat-img.png";
         document.getElementById("switchStatus").textContent = "Switched On";
  document.getElementById("offSwitch").style.backgroundColor = "#e12d39";
  document.getElementById("onSwitch").style.backgroundColor = "#cbd2d9";

    }
 </script>
 </body>
</html>
